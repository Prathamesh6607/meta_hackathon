<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task 1 Learning Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/ui-assets/styles.css" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <main class="layout">
    <header class="hero hero-slim">
      <p class="eyebrow">Task 1 Learning Log</p>
      <h1>Epoch Learning Records</h1>
      <p class="subtitle">Inspect each epoch load, the policy update, and the action that produced it.</p>
      <div class="button-row hero-actions">
        <a class="btn btn-ghost" href="/ui">Back to Main UI</a>
        <button id="refreshBtn" class="btn btn-primary">Refresh Log</button>
      </div>
    </header>

    <section class="panel">
      <h2>Log Summary</h2>
      <div id="logSummary" class="support-stats"></div>
      <div class="control-row log-filter-row">
        <label for="epochFilter">Filter by Epoch Run</label>
        <input id="epochFilter" type="number" min="0" placeholder="All epochs" />
      </div>
    </section>

    <section class="panel">
      <h2>Learning Entries</h2>
      <div id="logList" class="log-list"></div>
    </section>
  </main>

  <script src="/ui-assets/logs.js" defer></script>
</body>
</html>
